<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login&signup</title>
    <link rel="stylesheet" href="login&signupfinal.css">
</head>
<body>
    <div class="box" id="formBox">
        <!--login form-->
        <form id="loginForm">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" placeholder="Email or Username" required>
            </div>
            <div class="input-box">
                <input type="password" id="loginPassword" placeholder="Password" required>
                <span class="lock" id="toggleLoginPassword">🔒</span>
            </div>
            <div class="checkbox-row">
                <label >
                    <input type="checkbox"required>Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" onclick="loginalert()">Login</button>
            <div class="social-icons">
                <img src="Google.png" alt="Google" title="Google" width="25px">
                <img src="Facebook.png" alt="Facebook" title="Facebook" width="25px">
                <img src="LinkeIn.png" alt="LinkedIn" title="LinkedIn" width="25px">
                <img src="X.png" alt="X" title="X" width="25px">
            </div>
            <div class="switch-row">
            <p>Don't have an account?</p>
            <p class="switch" onclick="signup()">SignUp</p>
            </div>
        </form>
        <!--signup form-->
        <form id="signupForm" style="display:none;">
            <h1>SignUp</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <input type="email" placeholder="Email" required>
            </div>
            <div>
                <input type="password" id="signupPassword" placeholder="Password"required>
                <span class="lock" id="toggleSignupPassword">🔒</span>
            </div>
            <button type="submit" onclick="signupalert()">Create Account</button>
            <div class="social-icons">
                <img src="Google.png" alt="Google" title="Google" width="25px">
                <img src="Facebook.png" alt="Facebook" title="Facebook" width="25px">
                <img src="LinkeIn.png" alt="LinkedIn" title="LinkedIn" width="25px">
                <img src="X.png" alt="X" title="X" width="25px">
            </div>
            <div class="switch-row">
            <p>Already have an account?</p>
            <p class="switch" onclick="login()">Login</p>
            </div>
        </form>
    </div>
    <!--Adding JavaScript-->
    <script src="login&signupfinal.js"></script>
</body>
</html>
